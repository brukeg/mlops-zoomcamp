name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: make -f 06-best-practices/code/Makefile setup

      - name: Quality checks
        run: make -f 06-best-practices/code/Makefile quality_checks

      - name: Unit and component tests
        run: make -f 06-best-practices/code/Makefile test
